<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO 2026 — Generative Engine Optimization | Leroy Merlin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   CSS RESET & VARIABLES
   ═══════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* 🟢 FONDOS LEROY MERLIN (Light Theme) */
  --bg-primary: #ffffff;
  --bg-secondary: #f4f5f7;
  --bg-card: #ffffff;
  --bg-card-hover: #fafafa;
  
  /* 🟢 COLORES CORPORATIVOS LEROY MERLIN */
  --accent: #78b833;
  --accent-glow: rgba(120, 184, 51, 0.15);
  --accent-light: #5a8f24; /* Verde un poco más oscuro para contrastar en fondo blanco */
  --border-accent: rgba(120, 184, 51, 0.3);
  
  --green: #2ea043;
  --blue: #0969da;
  --purple: #8250df;
  --orange: #bf8700;
  --yellow: #d4a72c;
  
  /* 🟢 TEXTOS Y BORDES */
  --text-primary: #111827;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --border: rgba(0, 0, 0, 0.1);
  
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-serif: 'Playfair Display', Georgia, serif;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) var(--bg-secondary);
}

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.7;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════
   SCROLL PROGRESS BAR
   ═══════════════════════════════════════════════ */
.scroll-progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--green), var(--blue));
  z-index: 9999;
  transition: width 0.1s linear;
  box-shadow: 0 0 10px var(--accent);
}

/* ═══════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════ */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  padding: 0 2rem;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.8);
  border-bottom: 1px solid transparent;
}

.nav.scrolled {
  border-bottom-color: var(--border);
  background: rgba(255, 255, 255, 0.98);
  box-shadow: 0 4px 20px rgba(0,0,0,0.03);
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.nav-logo {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--text-primary);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.nav-logo span { color: var(--accent); font-weight: 800; }

.nav-links {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  list-style: none;
}

.nav-links a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 0.4rem 0.75rem;
  border-radius: 6px;
  transition: all 0.2s;
  white-space: nowrap;
}

.nav-links a:hover, .nav-links a.active {
  color: var(--accent-light);
  background: rgba(120,184,51,0.1);
}

.nav-cta {
  background: var(--accent) !important;
  color: #ffffff !important;
  padding: 0.45rem 1rem !important;
  border-radius: 6px !important;
  font-weight: 700 !important;
  transition: all 0.2s !important;
}

.nav-cta:hover {
  background: var(--accent-light) !important;
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(120,184,51,0.3);
}

.nav-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 1.5rem;
  cursor: pointer;
}

/* ═══════════════════════════════════════════════
   HERO SECTION
   ═══════════════════════════════════════════════ */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 6rem 2rem 4rem;
}

.hero-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.hero-image {
  position: absolute;
  inset: 0;
  background: url('https://images.unsplash.com/photo-1677442136019-21780ecad995?w=1920&q=80') center/cover no-repeat;
  opacity: 0.05;
  filter: saturate(0);
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(120,184,51,0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,184,51,0.1) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 70%);
}

.hero-glow {
  position: absolute;
  width: 800px;
  height: 800px;
  border-radius: 50%;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(120,184,51,0.06) 0%, transparent 70%);
  animation: pulseGlow 8s ease-in-out infinite;
}

@keyframes pulseGlow {
  0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
}

.hero-content {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 900px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.4rem 1rem;
  background: var(--accent-glow);
  border: 1px solid var(--border-accent);
  border-radius: 50px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent-light);
  margin-bottom: 2rem;
  animation: fadeUp 0.8s ease-out;
}

.hero-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: blink 2s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(3rem, 8vw, 6.5rem);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.03em;
  margin-bottom: 1.5rem;
  animation: fadeUp 0.8s ease-out 0.1s both;
  color: var(--text-primary);
}

.hero h1 .accent {
  background: linear-gradient(135deg, var(--accent), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(1.1rem, 2.5vw, 1.4rem);
  color: var(--text-secondary);
  max-width: 650px;
  margin: 0 auto 3rem;
  line-height: 1.6;
  font-weight: 400;
  animation: fadeUp 0.8s ease-out 0.2s both;
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
  max-width: 700px;
  margin: 0 auto;
  animation: fadeUp 0.8s ease-out 0.4s both;
}

.hero-stat {
  text-align: center;
  padding: 1.5rem;
  border-radius: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  box-shadow: 0 4px 20px rgba(0,0,0,0.02);
  transition: all 0.3s;
}

.hero-stat:hover {
  border-color: var(--border-accent);
  background: var(--accent-glow);
  transform: translateY(-2px);
}

.hero-stat .number {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 800;
  margin-bottom: 0.3rem;
  display: block;
}

.hero-stat:nth-child(1) .number { color: var(--accent); }
.hero-stat:nth-child(2) .number { color: var(--blue); }
.hero-stat:nth-child(3) .number { color: var(--orange); }

.hero-stat .label {
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.4;
}

.hero-scroll-hint {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-muted);
  font-size: 0.75rem;
  animation: bounce 2s infinite;
}

.hero-scroll-hint .arrow {
  width: 20px;
  height: 20px;
  border-right: 2px solid var(--text-muted);
  border-bottom: 2px solid var(--text-muted);
  transform: rotate(45deg);
}

@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

/* ═══════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.reveal.visible { opacity: 1; transform: translateY(0); }

.reveal-left {
  opacity: 0;
  transform: translateX(-40px);
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.reveal-left.visible { opacity: 1; transform: translateX(0); }

.reveal-right {
  opacity: 0;
  transform: translateX(40px);
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.reveal-right.visible { opacity: 1; transform: translateX(0); }

.reveal-scale {
  opacity: 0;
  transform: scale(0.9);
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.reveal-scale.visible { opacity: 1; transform: scale(1); }

.stagger > * {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.stagger.visible > *:nth-child(1) { transition-delay: 0s; }
.stagger.visible > *:nth-child(2) { transition-delay: 0.1s; }
.stagger.visible > *:nth-child(3) { transition-delay: 0.15s; }
.stagger.visible > *:nth-child(4) { transition-delay: 0.2s; }
.stagger.visible > *:nth-child(5) { transition-delay: 0.25s; }
.stagger.visible > *:nth-child(6) { transition-delay: 0.3s; }
.stagger.visible > *:nth-child(7) { transition-delay: 0.35s; }
.stagger.visible > *:nth-child(8) { transition-delay: 0.4s; }
.stagger.visible > *:nth-child(9) { transition-delay: 0.45s; }
.stagger.visible > * { opacity: 1; transform: translateY(0); }
.stagger:not(.visible) > * { opacity: 0; transform: translateY(20px); }

/* ═══════════════════════════════════════════════
   SECTIONS COMMON
   ═══════════════════════════════════════════════ */
section { padding: 7rem 2rem; position: relative; }
.container { max-width: 1100px; margin: 0 auto; }
.container-wide { max-width: 1300px; margin: 0 auto; }

.section-label {
  font-family: var(--font-display);
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent-light);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.section-label::before {
  content: '';
  width: 24px;
  height: 2px;
  background: var(--accent);
}

.section-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 1.5rem;
}

.section-desc {
  font-size: 1.1rem;
  color: var(--text-secondary);
  max-width: 700px;
  line-height: 1.7;
  margin-bottom: 3rem;
}

.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

/* ═══════════════════════════════════════════════
   FULL-WIDTH PHOTO BREAKS
   ═══════════════════════════════════════════════ */
.photo-break {
  width: 100%;
  height: 50vh;
  min-height: 350px;
  position: relative;
  overflow: hidden;
}

.photo-break img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.photo-break-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0.8) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo-break-text {
  text-align: center;
  max-width: 700px;
  padding: 2rem;
}

.photo-break-text h2 {
  font-family: var(--font-serif);
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.75rem;
  color: #ffffff;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}

.photo-break-text p {
  font-size: 1.1rem;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 10px rgba(0,0,0,0.8);
}

/* ═══════════════════════════════════════════════
   EDITORIAL TEXT SECTIONS
   ═══════════════════════════════════════════════ */
.editorial {
  padding: 6rem 2rem;
  display: flex;
  justify-content: center;
}

.editorial-content {
  max-width: 680px;
}

.editorial-content .dropcap::first-letter {
  font-family: var(--font-serif);
  font-size: 4.5rem;
  float: left;
  line-height: 0.8;
  margin-right: 0.75rem;
  margin-top: 0.1rem;
  color: var(--accent);
  font-weight: 700;
}

.editorial-content p {
  font-size: 1.15rem;
  line-height: 1.85;
  color: var(--text-secondary);
  margin-bottom: 1.5rem;
}

.editorial-content p.lead {
  font-size: 1.35rem;
  line-height: 1.7;
  color: var(--text-primary);
  font-weight: 400;
}

.editorial-content blockquote {
  border-left: 3px solid var(--accent);
  padding: 1rem 0 1rem 1.5rem;
  margin: 2.5rem 0;
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 1.5rem;
  line-height: 1.5;
  color: var(--text-primary);
}

.editorial-content blockquote cite {
  display: block;
  font-family: var(--font-body);
  font-style: normal;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 0.75rem;
}

.editorial-content .stat-inline {
  display: inline;
  font-family: var(--font-display);
  font-weight: 800;
  color: var(--accent-light);
}

/* ═══════════════════════════════════════════════
   IMAGE + TEXT SPLIT SECTIONS
   ═══════════════════════════════════════════════ */
.split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  min-height: 500px;
}

.split-image {
  position: relative;
  overflow: hidden;
}

.split-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.8s;
}

.split-image:hover img { transform: scale(1.03); }

.split-text {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 4rem;
  background: var(--bg-secondary);
}

.split-text h2 {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 3vw, 2.4rem);
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 1rem;
}

.split-text p {
  font-size: 1rem;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 1rem;
}

.split-text .highlight-num {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 0.5rem;
}

/* ═══════════════════════════════════════════════
   SVG DIAGRAM - RAG PROCESS
   ═══════════════════════════════════════════════ */
.diagram-container {
  background: var(--bg-card);
  border-radius: 20px;
  border: 1px solid var(--border);
  padding: 3rem;
  margin: 2rem 0;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.02);
}

.diagram-container svg {
  width: 100%;
  height: auto;
  display: block;
}

/* ═══════════════════════════════════════════════
   PHOTO GRID
   ═══════════════════════════════════════════════ */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  margin: 3rem 0;
  border-radius: 16px;
  overflow: hidden;
}

.photo-grid-item {
  position: relative;
  aspect-ratio: 4/3;
  overflow: hidden;
}

.photo-grid-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s;
  display: block;
}

.photo-grid-item:hover img {
